<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Training</title>

<link rel="stylesheet" href="./css/main.css">
<link rel="stylesheet" href="./css/training.css">

</head>

<body>

<h1>🏋️ Entrenamientos del equipo</h1>

<section style="margin-top:15px;">

<!-- EQUIPO -->
<select id="teamsDropdown">
  <option value="">-- Selecciona un equipo --</option>
</select>

<!-- CONTENEDOR ENTRENAMIENTOS -->
<div id="trainingContainer" style="margin-top:20px;"></div>

<!-- BOTÓN ENVIAR -->
<div style="margin-top:20px;">
  <button id="btnEnviar">ENVIAR ENTRENAMIENTO</button>
</div>

<!-- RESULTADO -->
<div id="resultado" style="margin-top:15px;"></div>

</section>

<!-- AGREGAR ESTO -->
<div style="margin: 15px 0;">
  <label>PIN del equipo: </label>
  <input type="password" id="pinInput" placeholder="1234" maxlength="9" style="padding:5px;width:100px;">
</div>
<button id="btnEnviar">📤 Enviar Entrenamientos</button>

<script type="module" src="./JS/training.js"></script>

</body>
</html>
