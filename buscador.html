<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PVL Player Search</title>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #eee;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #333;
      text-align: left;
    }

    tr:hover {
      background: #222;
    }
  </style>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>

<h1>🔎 PVL Global Player Search</h1>

<input 
  type="text" 
  id="search" 
  placeholder="Ej: mitoma | st>10 age<23 | nat=bra"
/>

<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Equipo</th>
      <th>Edad</th>
      <th>NAT</th>
      <th>ST</th>
      <th>TK</th>
      <th>PS</th>
      <th>SH</th>
      <th>KAb</th>
      <th>TAb</th>
      <th>PAb</th>
      <th>SAb</th>
    </tr>
  </thead>
  <tbody id="results"></tbody>
</table>


<script src="./JS/buscador.js"></script>

</body>
</html>
