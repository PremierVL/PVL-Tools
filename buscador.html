<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Scouting Dashboard Pro</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: white;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 1.1rem;
    margin-bottom: 40px;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 20px;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 4px solid #334155;
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .panel {
    background: rgba(17, 28, 51, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .search-row {
    display: grid;
    grid-template-columns: 1fr 300px 1fr;
    gap: 20px;
    margin-bottom: 25px;
    align-items: end;
  }

  @media (max-width: 1200px) {
    .search-row {
      grid-template-columns: 1fr;
      gap: 15px;
    }
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .filter-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-wrapper {
    position: relative;
  }

  input, select {
    width: 100%;
    padding: 14px 20px;
    border: 2px solid transparent;
    border-radius: 12px;
    background: rgba(30, 41, 59, 0.8);
    color: white;
    font-size: 16px;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  input:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    background: rgba(30, 41, 59, 1);
  }

  input::placeholder {
    color: #64748b;
  }

  .filters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 25px;
  }

  .range-group {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .range-inputs {
    display: flex;
    gap: 8px;
    flex: 1;
  }

  input[type="range"] {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: #334155;
    accent-color: #3b82f6;
    cursor: pointer;
  }

  .range-value {
    min-width: 45px;
    font-weight: 600;
    color: #3b82f6;
    font-size: 14px;
  }

  .position-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 12px;
    margin-bottom: 25px;
  }

  .pos-btn {
    padding: 12px 8px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: rgba(30, 41, 59, 0.6);
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pos-btn:hover {
    background: rgba(59, 130, 246, 0.2);
    border-color: #3b82f6;
    transform: translateY(-2px);
  }

  .pos-btn.active {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-color: #60a5fa;
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    transform: translateY(-2px);
  }

  .action-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: white;
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
  }

  .btn-secondary {
    background: rgba(71, 85, 105, 0.6);
    color: white;
    border: 2px solid rgba(71, 85, 105, 0.3);
  }

  .btn-secondary:hover {
    background: rgba(71, 85, 105, 0.8);
    border-color: #94a3b8;
    transform: translateY(-2px);
  }

  .stats-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .stat-card {
    background: rgba(30, 41, 59, 0.6);
    padding: 15px 25px;
    border-radius: 12px;
    text-align: center;
    min-width: 120px;
  }

  .stat-number {
    font-size: 1.5rem;
    font-weight: 800;
    color: #3b82f6;
  }

  .stat-label {
    font-size: 0.8rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .table-container {
    background: rgba(17, 28, 51, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(59, 130, 246, 0.2);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th {
    background: linear-gradient(135deg, #1e293b, #111827);
    padding: 18px 12px;
    text-align: center;
    font-weight: 700;
    font-size: 12px;
    color: #f8fafc;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #334155;
  }

  td {
    padding: 16px 12px;
    border-bottom: 1px solid #334155;
    text-align: center;
  }

  tr:hover {
    background: rgba(59, 130, 246, 0.1);
  }

  .name-cell {
    font-weight: 600;
    text-align: left;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }

  .no-results i {
    font-size: 4rem;
    display: block;
    margin-bottom: 20px;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    .container { padding: 10px; }
    h1 { font-size: 2rem; }
    .panel { padding: 20px; }
    .position-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

<body>
<div class="container">
  <h1>🏆 Scouting Dashboard Pro</h1>
  <p class="subtitle">Encuentra los mejores talentos con filtros avanzados</p>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Cargando base de datos de jugadores...</div>
    <div style="font-size: 0.9rem; color: #64748b;">Esto puede tomar unos segundos</div>
  </div>

  <div id="controls" style="display: none;">
    <div class="panel">
      <div class="search-row">
        <div class="filter-group">
          <label class="filter-label">🔍 Buscar jugador</label>
          <div class="input-wrapper">
            <input type="text" id="nameSearch" placeholder="Escribe el nombre del jugador...">
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">⚽ Equipo</label>
          <select id="teamFilter">
            <option value="all">Todos los equipos</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">🏳️ Nacionalidad</label>
          <select id="natFilter">
            <option value="all">Todas las nacionalidades</option>
          </select>
        </div>
      </div>

      <div class="filters-grid">
        <div class="filter-group">
          <label class="filter-label">📏 Edad</label>
          <div class="range-group">
            <div class="range-inputs">
              <input type="range" id="ageMin" min="16" max="40" value="16">
              <span class="range-value" id="ageMinVal">16</span>
            </div>
            <div class="range-inputs">
              <input type="range" id="ageMax" min="16" max="40" value="40">
              <span class="range-value" id="ageMaxVal">40</span>
            </div>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">⭐ ST (Strength)</label>
          <div class="range-group">
            <div class="range-inputs">
              <input type="range" id="stMin" min="0" max="20" value="0">
              <span class="range-value" id="stMinVal">0</span>
            </div>
            <div class="range-inputs">
              <input type="range" id="stMax" min="0" max="20" value="20">
              <span class="range-value" id="stMaxVal">20</span>
            </div>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">⚔️ TK (Tackle)</label>
          <div class="range-group">
            <div class="range-inputs">
              <input type="range" id="tkMin" min="0" max="20" value="0">
              <span class="range-value" id="tkMinVal">0</span>
            </div>
            <div class="range-inputs">
              <input type="range" id="tkMax" min="0" max="20" value="20">
              <span class="range-value" id="tkMaxVal">20</span>
            </div>
          </div>
        </div>
      </div>

      <div class="position-grid">
        <button class="pos-btn active" data-pos="all">TODOS</button>
        <button class="pos-btn" data-pos="GK">🧤 GK</button>
        <button class="pos-btn" data-pos="DF">🛡️ DF</button>
        <button class="pos-btn" data-pos="MF">⚙️ MF</button>
        <button class="pos-btn" data-pos="FW">⚽ FW</button>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" onclick="updateAll()">🔍 BUSCAR JUGADORES</button>
        <button class="btn btn-secondary" onclick="resetFilters()">🔄 Resetear todo</button>
        <button class="btn btn-secondary" onclick="exportResults()">📊 Exportar CSV</button>
      </div>

      <div class="stats-row" id="statsRow" style="display: none;">
        <div class="stat-card">
          <div class="stat-number" id="totalPlayers">0</div>
          <div class="stat-label">Jugadores encontrados</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avgAge">-</div>
          <div class="stat-label">Edad promedio</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="topStat">-</div>
          <div class="stat-label">Mejor stat</div>
        </div>
      </div>
    </div>
  </div>

  <div id="tableContainer" class="table-container" style="display: none;">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Equipo</th>
          <th>Edad</th>
          <th>NAT</th>
          <th>ST</th>
          <th>TK</th>
          <th>PS</th>
          <th>SH</th>
          <th>AG</th>
          <th>KAb</th>
          <th>TAb</th>
          <th>PAb</th>
          <th>SAb</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </div>
</div>

<script src="./JS/buscador.js"></script>
</body>
</html>
