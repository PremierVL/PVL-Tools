<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scouting Dashboard</title>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 10px;
    text-align: center;
  }

  .loading {
    text-align: center;
    padding: 50px;
    font-size: 18px;
    color: #94a3b8;
  }

  .panel {
    background: #111c33;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 15px;
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type="text"], select, input[type="range"] {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    font-size: 14px;
  }

  input[type="text"]::placeholder {
    color: #64748b;
  }

  input[type="range"] {
    width: 120px;
    accent-color: #2563eb;
  }

  .position-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    font-size: 14px;
  }

  .btn-primary {
    background: #2563eb;
    color: white;
  }

  .btn-primary:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: #475569;
    color: white;
  }

  .btn-secondary:hover {
    background: #334155;
    transform: translateY(-1px);
  }

  .btn-active {
    background: #3b82f6 !important;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
  }

  .label {
    font-weight: 500;
    min-width: 60px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: #111c33;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }

  th, td {
    padding: 12px 8px;
    border-bottom: 1px solid #223;
    text-align: center;
  }

  th {
    background: #1e293b;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  tr:hover {
    background: #1b2a44;
  }

  .no-results {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
    font-style: italic;
  }

  @media (max-width: 768px) {
    .row {
      flex-direction: column;
      align-items: stretch;
    }
    
    .position-buttons {
      justify-content: center;
    }
  }
</style>
</head>

<body>

<h1>🔎 Scouting Dashboard</h1>

<div id="loading" class="loading">⏳ Cargando datos...</div>

<div id="controls" class="panel" style="display: none;">

  <div class="row">
    <div class="input-group">
      <label class="label">Buscar:</label>
      <input type="text" id="nameSearch" placeholder="Nombre del jugador...">
    </div>
  </div>

  <div class="row">
    <div class="input-group">
      <label class="label">Equipo:</label>
      <select id="teamFilter"></select>
    </div>
    <div class="input-group">
      <label class="label">Nacionalidad:</label>
      <select id="natFilter"></select>
    </div>
  </div>

  <div class="row">
    <div class="input-group">
      <label class="label">Posición:</label>
      <div class="position-buttons">
        <button class="btn-primary btn-pos" data-pos="all">TODOS</button>
        <button class="btn-secondary btn-pos" data-pos="GK">GK</button>
        <button class="btn-secondary btn-pos" data-pos="DF">DF</button>
        <button class="btn-secondary btn-pos" data-pos="MF">MF</button>
        <button class="btn-secondary btn-pos" data-pos="FW">FW</button>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="input-group">
      <label class="label">Edad:</label>
      <input type="range" id="ageMin" min="16" max="40">
      <input type="range" id="ageMax" min="16" max="40">
      <span id="ageLabel"></span>
    </div>
    <button class="btn-secondary" onclick="resetFilters()">🔄 Resetear filtros</button>
  </div>

</div>

<table id="tableContainer" style="display: none;">
<thead>
<tr>
  <th>Nombre</th>
  <th>Equipo</th>
  <th>Edad</th>
  <th>NAT</th>
  <th>ST</th>
  <th>TK</th>
  <th>PS</th>
  <th>SH</th>
  <th>KAb</th>
  <th>TAb</th>
  <th>PAb</th>
  <th>SAb</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script src="./JS/buscador.js"></script>

</body>
</html>
